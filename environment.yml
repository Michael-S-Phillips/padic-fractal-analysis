name: padic-fractal-analysis
channels:
  - conda-forge
  - defaults
dependencies:
  # Core scientific computing
  - python=3.10
  - numpy>=1.21.0
  - scipy>=1.7.0
  - scikit-image>=0.18.0
  - scikit-learn>=1.0.0

  # Geospatial and raster processing
  - gdal>=3.4.0
  - rasterio>=1.2.0
  - geopandas>=0.10.0
  - pyproj>=3.0.0

  # Visualization and notebooks
  - matplotlib>=3.4.0
  - jupyter>=1.0.0
  - jupyterlab>=3.0.0
  - plotly>=5.0.0

  # Data processing
  - pandas>=1.3.0
  - h5py>=3.0.0
  - pywavelets>=1.2.0

  # Development and optimization
  - numba>=0.55.0
  - cython>=0.29.0

  # Testing
  - pytest>=7.0.0
  - pytest-cov>=4.0.0

  # Code quality
  - black>=22.0.0
  - isort>=5.10.0
  - flake8>=4.0.0
  - mypy>=0.950

  # Documentation
  - sphinx>=4.5.0
  - sphinx-rtd-theme>=1.0.0

# Pip packages for things not available in conda
pip:
  - rich>=10.0.0

variables:
  PYTHONPATH: ./src:$PYTHONPATH
